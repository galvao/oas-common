# RFC 9457 / Problem Details for HTTP APIs
#
# Refs:
# - https://www.rfc-editor.org/rfc/rfc9457
# - https://www.rfc-editor.org/rfc/rfc7807 (obsoleted by RFC 9457)
#
# This schema is intended to be used with: application/problem+json
#
# Note: This is a *schema component* file so that other components can
# reference it via $ref.

Problem:
  type: object
  additionalProperties: true
  properties:
    type:
      type: string
      format: uri
      description: |
        A URI reference that identifies the problem type.
    title:
      type: string
      description: |
        A short, human-readable summary of the problem type.
    status:
      type: integer
      format: int32
      minimum: 100
      maximum: 599
      description: |
        The HTTP status code generated by the origin server.
    detail:
      type: string
      description: |
        A human-readable explanation specific to this occurrence of the problem.
    instance:
      type: string
      format: uri
      description: |
        A URI reference that identifies the specific occurrence of the problem.
  required:
    - type
    - title
